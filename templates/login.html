<title>Login</title>
<h1>Login</h1>
<form method="POST">
    Username: <input name="USER" placeholder="Username">
    Password: <input name="PASSWORD" placeholder="Password">
    <button type="submit">Sign In</button>
</form>

{% if error %}
    <p class="error">{{error}}</p>
{% endif %}

<a href="/signup">New User? Create Account</a>
